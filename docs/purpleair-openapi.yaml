  /sensors/{sensor_index}/history:
    get:
      operationId: get-sensor-history
      summary: Get Sensor History
      description: Retrieves the latest history of a single sensor matching the provided sensor_index.
        Has a default rate limit of 1000ms (1 second). When using only a single start_timestamp or end_timestamp,
        the maximum amount of data will be returned (dependent on the provided average). If a smaller
        amount of data is needed, supplying both timestamp parameters is recommended to conserve points.
      tags:
      - sensors
      parameters:
      - name: sensor_index
        in: path
