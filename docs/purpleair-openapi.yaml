            application/json:
              schema:
                type: object
                properties:
                  api_key_type:
                    type: string
                    description: 'The api_key type. UNKNOWN: The key type is unknown. Contact PurpleAir.
                      READ: A key that works for requests requiring a READ key. Used for API requests
                      that read data. WRITE: A key that works for requests requiring a WRITE key. Used
                      for API requests that modify data. READ_DISABLED: A read key that was administratively
                      disabled. If your key is returning this type, please contact PurpleAir. WRITE_DISABLED:
                      A write key that was administratively disabled. If your key is returning this type,
                      please contact PurpleAir.'
