          places are configurable per field, varying precision levels can be applied to different fields
          in the same request: fields=temperature|d1,pm2.5_atm_a|d2,pm2.5_atm_b|d0'
        schema:
          type: string
        required: true
      responses:
        '200':
          description: Success 200
          content:
            application/json:
              schema:
                type: object
                properties:
                  sensor_index:
                    type: integer
                    description: The sensor_index used in the API request.
                  start_timestamp:
                    type: integer
                    description: The UNIX time stamp used in the API request.
                  end_timestamp:
                    type: integer
                    description: The UNIX time stamp used in the API request.
                  average:
                    type: integer
                    description: The average parameter used in the API request.
                  fields:
                    type: string
                    description: An array of values representing the headers for the "data" object and
