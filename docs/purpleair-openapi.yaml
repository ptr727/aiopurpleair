openapi: 3.0.3
info:
  title: PurpleAir API (Unofficial OpenAPI Reconstruction)
  version: 1.2.0
  description: Unofficial OpenAPI spec reconstructed from PurpleAir's apiDoc data at /api_data.js. REST
    API changelog version 1.2.0; apiDoc build-metadata version 1.0.15 lags and is not used. Generated
    by scripts/generate_openapi.py.
servers:
- url: https://api.purpleair.com/v1
security:
- ApiKeyHeader: []
paths:
  /groups:
    post:
      operationId: create-group
      summary: Create Group
      description: Creates a new group. Has a default rate limit of 100ms.
      tags:
      - groups
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: The name to give the new group.
      responses:
        '200':
          description: Success
        4XX:
          description: Error response with a PurpleAir error code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      operationId: get-groups-list
      summary: Get Groups List
      description: Retrieves a list of all groups owned by the provided api_key. Has a default rate limit
        of 400ms.
      tags:
      - groups
      responses:
        '200':
          description: Group Info
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: string
                    description: An array of groups owned by this api_key.
                  id:
                    type: number
                    description: The group id for the entry.
                  name:
                    type: string
                    description: The group name for the entry.
                  created:
                    type: number
                    description: The UTC timestamp from when the entry was created.
        4XX:
          description: Error response with a PurpleAir error code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /groups/{group_id}:
    delete:
      operationId: delete-group
      summary: Delete Group
      description: As a safety precaution, attempting to delete a group with members will result in an
        error. Please delete the members first. Has a default rate limit of 100ms.
      tags:
      - groups
      parameters:
      - name: group_id
        in: path
        required: true
        description: Groups unique ID.
        schema:
          type: number
      responses:
        '200':
          description: Success
        4XX:
          description: Error response with a PurpleAir error code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      operationId: get-group-detail
      summary: Get Group Detail
      description: Retrieves a list of all members of the specified group. Has a default rate limit of
        100ms.
      tags:
      - groups
      parameters:
      - name: group_id
        in: path
        required: true
        description: The group_id of the requested group. This group must be owned by the api_key.
        schema:
          type: number
      responses:
        '200':
          description: Success
        4XX:
          description: Error response with a PurpleAir error code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /groups/{group_id}/members:
    post:
      operationId: create-member
      summary: Create Member
      description: Creates a member of the specified group from the provided sensor. A successful call
        typically costs more than 150 points, due to all real-time fields being returned for the newly
        created group member. Has a default rate limit of 100ms.
      tags:
      - groups
      parameters:
      - name: group_id
        in: path
        required: true
        description: The group_id of the group to add a member to. This group must be owned by the api_key.
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sensor_id:
                  type: string
                  description: The sensor_id of the new member sensor. This must be AS PRINTED on the
                    sensor’s label.
                sensor_index:
                  type: integer
                  description: The sensor_index of the new member as found in the JSON for this specific
                    sensor.
                owner_email:
                  type: string
                  description: An email address that matches the Owner email as set by previously completing
                    the PurpleAir registration form at www.purpleair.com/register.
                location_type:
                  type: integer
                  description: 'The expected location_type of the new member. Possible values are: 0 =
                    Outside or 1 = Inside. If the target member is not of this type, an error will result.
                    NOTE: This value is required if the sensor in question is marked as ‘private’ on the
                    registration form.'
      responses:
        '201':
          description: Success 201
          content:
            application/json:
              schema:
                type: object
                properties:
                  group_id:
                    type: integer
                    description: The group ID that was included in the request.
                  member_id:
                    type: integer
                    description: The member ID that was included in the request.
        4XX:
          description: Error response with a PurpleAir error code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      operationId: get-members-data
      summary: Get Members Data
      description: Retrieves a list of all sensors in the specified group. Has a default rate limit of
        500ms. The returned JSON is identical to the Sensors -> Current Readings API section and is detailed
        again below for your convenience.
      tags:
      - groups
      parameters:
      - name: group_id
        in: path
        required: true
        description: The group_id of the requested group. This group must be owned by the api_key.
        schema:
          type: number
      - name: fields
        in: query
        description: 'The ''Fields'' parameter specifies which ''sensor data fields'' to include in the
          response. It accepts a comma-separated list of field names, optionally with per-field formatting
          options. For descriptions of individual fields, please see the ''sensor data fields'' section.
          Station information and status fields: name, icon, model, hardware, location_type, private,
          latitude, longitude, altitude, position_rating, led_brightness, firmware_version, firmware_upgrade,
          rssi, uptime, pa_latency, memory, last_seen, last_modified, date_created, channel_state, channel_flags,
          channel_flags_manual, channel_flags_auto, confidence, confidence_manual, confidence_auto Environmental
          fields: humidity, humidity_a, humidity_b, temperature, temperature_a, temperature_b, pressure,
          pressure_a, pressure_b Miscellaneous fields: voc, voc_a, voc_b, ozone1, analog_input PM1.0 fields:
          pm1.0, pm1.0_a, pm1.0_b, pm1.0_atm, pm1.0_atm_a, pm1.0_atm_b, pm1.0_cf_1, pm1.0_cf_1_a, pm1.0_cf_1_b
          PM2.5 fields: pm2.5_alt, pm2.5_alt_a, pm2.5_alt_b, pm2.5, pm2.5_a, pm2.5_b, pm2.5_atm, pm2.5_atm_a,
          pm2.5_atm_b, pm2.5_cf_1, pm2.5_cf_1_a, pm2.5_cf_1_b PM2.5 pseudo (simple running) average fields:
          pm2.5_10minute, pm2.5_10minute_a, pm2.5_10minute_b, pm2.5_30minute, pm2.5_30minute_a, pm2.5_30minute_b,
          pm2.5_60minute, pm2.5_60minute_a, pm2.5_60minute_b, pm2.5_6hour, pm2.5_6hour_a, pm2.5_6hour_b,
          pm2.5_24hour, pm2.5_24hour_a, pm2.5_24hour_b, pm2.5_1week, pm2.5_1week_a, pm2.5_1week_b PM10.0
          fields: pm10.0, pm10.0_a, pm10.0_b, pm10.0_atm, pm10.0_atm_a, pm10.0_atm_b, pm10.0_cf_1, pm10.0_cf_1_a,
          pm10.0_cf_1_b Visibility fields: scattering_coefficient, scattering_coefficient_a, scattering_coefficient_b,
          deciviews, deciviews_a, deciviews_b, visual_range, visual_range_a, visual_range_b Particle count
          fields: 0.3_um_count, 0.3_um_count_a, 0.3_um_count_b, 0.5_um_count, 0.5_um_count_a, 0.5_um_count_b,
          1.0_um_count, 1.0_um_count_a, 1.0_um_count_b, 2.5_um_count, 2.5_um_count_a, 2.5_um_count_b,
          5.0_um_count, 5.0_um_count_a, 5.0_um_count_b, 10.0_um_count 10.0_um_count_a, 10.0_um_count_b
          Obsolete: Thingspeak is no longer used to store data, so the following fields are no longer
          relevant. ThingSpeak fields, used to retrieve data from api.thingspeak.com: primary_id_a, primary_key_a,
          secondary_id_a, secondary_key_a, primary_id_b, primary_key_b, secondary_id_b, secondary_key_b
          Configurable Decimal Places You can control how many decimal places are returned for each numeric
          field by using the syntax: fieldname|dN, where N is the maximum number of decimal places to
          include. For example, if pm2.5_atm_a is recorded as 3.23: Requested Field Returned Value pm2.5_atm_a|d0
          3 pm2.5_atm_a|d1 3.2 pm2.5_atm_a|d2 3.23 pm2.5_atm_a|d3 3.23 Note: No trailing zeros are added
          if the requested number of decimal places exceeds those present in the stored value. Requesting
          pm2.5_atm_a|d3 in the table above returns 3.23 rather than 3.230, because 3.23 is the actual
          value stored in the database. As decimal places are configurable per field, varying precision
          levels can be applied to different fields in the same request: fields=temperature|d1,pm2.5_atm_a|d2,pm2.5_atm_b|d0'
        schema:
          type: string
        required: true
      - name: location_type
        in: query
        description: 'The location_type of the sensors. Possible values are: 0 = Outside or 1 = Inside.'
        schema:
          type: number
      - name: read_keys
        in: query
        description: 'A read_key is required for private devices. It is separate to the api_key and each
          sensor has its own read_key. Submit multiple keys by separating them with a comma (,) character
          for example: key-one,key-two,key-three.'
        schema:
          type: string
      - name: show_only
        in: query
        description: A comma (,) separated list of sensor_index values. When provided, the results are
          limited only to the sensors included in this list. Nullifies modified_since to take no effect
          if both are included.
        schema:
          type: string
      - name: modified_since
        in: query
        description: The modified_since parameter causes only sensors modified after the provided time
          stamp to be included in the results. Using the data_time_stamp value from a previous call (recommended)
          will limit results to those with new values since the last request. Using a value of 0 will
          match sensors modified at any time. Does not take effect if the show_only parameter is included
          as part of the request.
        schema:
          type: integer
      - name: max_age
        in: query
        description: Filter results to only include sensors modified or updated within the last number
          of seconds. Using a value of 0 will match sensors of any age.
        schema:
          type: integer
      - name: nwlat
        in: query
        description: A north west latitude for the bounding box. Use a bounding box to limit the sensors
          returned to a specific geographic area. The bounding box is defined by two points, a north west
          latitude/longitude and a south east latitude/longitude. Our community article here demonstrates
          using a bounding box in an API call.
        schema:
          type: number
      - name: nwlng
        in: query
        description: A north west longitude for the bounding box.
        schema:
          type: number
      - name: selat
        in: query
        description: A south east latitude for the bounding box.
        schema:
          type: number
      - name: selng
        in: query
        description: A south east longitude for the bounding box.
        schema:
          type: number
      responses:
        '200':
          description: Success 200
          content:
            application/json:
              schema:
                type: object
                properties:
                  fields:
                    type: string
                    description: An array of values representing the headers for the "data" object and
                      describes the meanings of the columns in the data object. For example, fields[column]
                      is the header for data[row][column]. You should always identify the data column
                      index by looking for the desired header in the fields array since the column order
                      is not guaranteed to always stay the same.
                  location_types:
                    type: string
                    description: 'When the data includes a location_type, this field is included with
                      the following values: ["outside", "inside"] An array representing the values for
                      the location_type column Possible values are: 0 = Outside or 1 = Inside.'
                  channel_states:
                    type: string
                    description: '["No PM", "PM-A", "PM-B", "PM-A+PM-B"] Possible values are: No PM =
                      No PM sensors were detected. PM-A = PM sensor on channel A only. PM-B = PM sensor
                      on channel B only. PM-A+PM-B = PM sensor on both channel A and B.'
                  channel_flags:
                    type: string
                    description: '["Normal", "A-Downgraded", "B-Downgraded", "A+B-Downgraded"] Possible
                      values are: Normal = No PM sensors are marked as downgraded. A-Downgraded = PM sensor
                      on channel A is marked as downgraded. B-Downgraded = PM sensor on channel B is marked
                      as downgraded. A+B-Downgraded = PM sensors on both channels A and B are marked as
                      downgraded. Includes downgrades manually set by PurpleAir and downgrades set automatically
                      by PurpleAir systems.'
                  channel_flags_auto:
                    type: string
                    description: the same as channel_flags, but only reflects downgrades set automatically
                      by PurpleAir systems.
                  channel_flags_manual:
                    type: string
                    description: the same as channel_flags, but only reflects downgrades manually set
                      by PurpleAir.
                  data:
                    type: object
                    description: An array of comma separated values, described by the fields array. Always
                      use the item index from the desired fields value to lookup the correct data column
                      since the order may change as columns are included or excluded.
        4XX:
          description: Error response with a PurpleAir error code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /groups/{group_id}/members/{member_id}:
    delete:
      operationId: delete-member
      summary: Delete Member
      description: Deletes a member from the specified group. Has a default rate limit of 100ms.
      tags:
      - groups
      parameters:
      - name: group_id
        in: path
        required: true
        description: Groups unique ID.
        schema:
          type: number
      - name: member_id
        in: path
        required: true
        description: Members unique ID.
        schema:
          type: number
      responses:
        '200':
          description: Success
        4XX:
          description: Error response with a PurpleAir error code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      operationId: get-member-data
      summary: Get Member Data
      description: Retrieves the latest data of a single sensor matching the provided member_id. Has a
        default rate limit of 100ms.
      tags:
      - groups
      parameters:
      - name: group_id
        in: path
        required: true
        description: Groups unique ID.
        schema:
          type: number
      - name: member_id
        in: path
        required: true
        description: Members unique ID.
        schema:
          type: number
      - name: fields
        in: query
        description: 'The ''Fields'' parameter specifies which ''sensor data fields'' to include in the
          response. It accepts a comma-separated list of field names, optionally with per-field formatting
          options. For descriptions of individual fields, please see the ''sensor data fields'' section.
          Station information and status fields: name, icon, model, hardware, location_type, private,
          latitude, longitude, altitude, position_rating, led_brightness, firmware_version, firmware_upgrade,
          rssi, uptime, pa_latency, memory, last_seen, last_modified, date_created, channel_state, channel_flags,
          channel_flags_manual, channel_flags_auto, confidence, confidence_manual, confidence_auto Environmental
          fields: humidity, humidity_a, humidity_b, temperature, temperature_a, temperature_b, pressure,
          pressure_a, pressure_b Miscellaneous fields: voc, voc_a, voc_b, ozone1, analog_input PM1.0 fields:
          pm1.0, pm1.0_a, pm1.0_b, pm1.0_atm, pm1.0_atm_a, pm1.0_atm_b, pm1.0_cf_1, pm1.0_cf_1_a, pm1.0_cf_1_b
          PM2.5 fields: pm2.5_alt, pm2.5_alt_a, pm2.5_alt_b, pm2.5, pm2.5_a, pm2.5_b, pm2.5_atm, pm2.5_atm_a,
          pm2.5_atm_b, pm2.5_cf_1, pm2.5_cf_1_a, pm2.5_cf_1_b PM2.5 pseudo (simple running) average fields:
          pm2.5_10minute, pm2.5_10minute_a, pm2.5_10minute_b, pm2.5_30minute, pm2.5_30minute_a, pm2.5_30minute_b,
          pm2.5_60minute, pm2.5_60minute_a, pm2.5_60minute_b, pm2.5_6hour, pm2.5_6hour_a, pm2.5_6hour_b,
          pm2.5_24hour, pm2.5_24hour_a, pm2.5_24hour_b, pm2.5_1week, pm2.5_1week_a, pm2.5_1week_b PM10.0
          fields: pm10.0, pm10.0_a, pm10.0_b, pm10.0_atm, pm10.0_atm_a, pm10.0_atm_b, pm10.0_cf_1, pm10.0_cf_1_a,
          pm10.0_cf_1_b Particle count fields: 0.3_um_count, 0.3_um_count_a, 0.3_um_count_b, 0.5_um_count,
          0.5_um_count_a, 0.5_um_count_b, 1.0_um_count, 1.0_um_count_a, 1.0_um_count_b, 2.5_um_count,
          2.5_um_count_a, 2.5_um_count_b, 5.0_um_count, 5.0_um_count_a, 5.0_um_count_b, 10.0_um_count
          10.0_um_count_a, 10.0_um_count_b Obsolete: Thingspeak is no longer used to store data, so the
          following fields are no longer relevant. ThingSpeak fields, used to retrieve data from api.thingspeak.com:
          primary_id_a, primary_key_a, secondary_id_a, secondary_key_a, primary_id_b, primary_key_b, secondary_id_b,
          secondary_key_b Configurable Decimal Places You can control how many decimal places are returned
          for each numeric field by using the syntax: fieldname|dN, where N is the maximum number of decimal
          places to include. For example, if pm2.5_atm_a is recorded as 3.23: Requested Field Returned
          Value pm2.5_atm_a|d0 3 pm2.5_atm_a|d1 3.2 pm2.5_atm_a|d2 3.23 pm2.5_atm_a|d3 3.23 Note: No trailing
          zeros are added if the requested number of decimal places exceeds those present in the stored
          value. Requesting pm2.5_atm_a|d3 in the table above returns 3.23 rather than 3.230, because
          3.23 is the actual value stored in the database. As decimal places are configurable per field,
          varying precision levels can be applied to different fields in the same request: fields=temperature|d1,pm2.5_atm_a|d2,pm2.5_atm_b|d0'
        schema:
          type: string
      responses:
        '200':
          description: Sensor data stats object
          content:
            application/json:
              schema:
                type: object
                properties:
                  pm2.5:
                    type: number
                    description: Estimated mass concentration PM2.5 (µg/m³). PM2.5 are fine particulates
                      with a diameter of fewer than 2.5 microns.
                  pm2.5_10minute:
                    type: number
                    description: 10 minute pseudo (estimated) average for PM2.5
                  pm2.5_30minute:
                    type: number
                    description: 30 minute pseudo (estimated) average for PM2.5
                  pm2.5_60minute:
                    type: number
                    description: 60 minute pseudo (estimated) average for PM2.5
                  pm2.5_6hour:
                    type: number
                    description: 6 Hour pseudo (estimated) average for PM2.5
                  pm2.5_24hour:
                    type: number
                    description: 24 hour pseudo (estimated) average for PM2.5
                  pm2.5_1week:
                    type: number
                    description: 1 week pseudo (estimated) average for PM2.5
                  time_stamp:
                    type: integer
                    description: The servers UTC (Unix) time stamp from when data was received for this
                      channel.
        4XX:
          description: Error response with a PurpleAir error code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /groups/{group_id}/members/{member_id}/history/csv:
    get:
      operationId: get-member-history
      summary: Get Member History
      description: Retrieves historical data for a single sensor matching the provided member_id. Has
        a default rate limit of 1000ms (1 second).
      tags:
      - groups
      parameters:
      - name: group_id
        in: path
        required: true
        description: Groups unique ID.
        schema:
          type: number
      - name: member_id
        in: path
        required: true
        description: Members unique ID.
        schema:
          type: number
      - name: privacy
        in: query
        description: The privacy of returned data. Sensors can record data while registered as public
          or private. auto (default if not specified) returns data with privacy matching the sensor's
          current registration. both returns all data regardless of privacy and adds the private field
          to the returned data columns.
        schema:
          type: string
      - name: start_timestamp
        in: query
        description: The time stamp of the first required history entry. Query is executed using data_time_stamp
          >= start_timestamp. This can be specified as a UNIX time stamp in seconds or an ISO 8601 string.
          If not specified, the maximum amount of data for the requested average will be returned up to
          the provided end_timestamp. The time_stamp column of data in the response's JSON or CSV will
          use the same format and/or time zone used in the start_timestamp.
        schema:
          type: integer
      - name: end_timestamp
        in: query
        description: The end time stamp of the history to return. Query is executed using data_time_stamp
          < end_timestamp. This can be specified as a UNIX time stamp in seconds or an ISO 8601 string.
          If not specified, the maximum amount of data for the requested average will be returned starting
          from the provided start_timestamp.
        schema:
          type: integer
      - name: average
        in: query
        description: 'The desired average in minutes. The amount of data that can be returned in a single
          response depends on the average used in the request. Valid values are as follows: Average Maximum
          Data Returnable per Request 0 (Real-time) 30 days 10 (10-minute) 60 days 30 (30-minute) 90 days
          60 (1-hour) 180 days 360 (6-hour) 1 year 1440 (1-day) 2 years 10080 (1-week) 5 years 43200 (1-month)
          20 years 525600 (1-year) 100 years'
        schema:
          type: integer
      - name: fields
        in: query
        description: 'The ''Fields'' parameter specifies which ''sensor data fields'' to include in the
          response. It accepts a comma-separated list of field names, optionally with per-field formatting
          options. For descriptions of individual fields, please see the ''sensor data fields'' section.
          Note: Not all fields are available as history fields and we will be working to add more as time
          goes on. Fields marked with an asterisk (*) may not be available when using averages. Station
          information and status fields: hardware*, latitude*, longitude*, altitude*, firmware_version*,
          private, rssi, uptime, pa_latency, memory Environmental fields: humidity, humidity_a, humidity_b,
          temperature, temperature_a, temperature_b, pressure, pressure_a, pressure_b Miscellaneous fields:
          voc, voc_a, voc_b, analog_input PM1.0 fields: pm1.0_atm, pm1.0_atm_a, pm1.0_atm_b, pm1.0_cf_1,
          pm1.0_cf_1_a, pm1.0_cf_1_b PM2.5 fields: pm2.5_alt, pm2.5_alt_a, pm2.5_alt_b, pm2.5_atm, pm2.5_atm_a,
          pm2.5_atm_b, pm2.5_cf_1, pm2.5_cf_1_a, pm2.5_cf_1_b PM10.0 fields: pm10.0_atm, pm10.0_atm_a,
          pm10.0_atm_b, pm10.0_cf_1, pm10.0_cf_1_a, pm10.0_cf_1_b Visibility fields: scattering_coefficient,
          scattering_coefficient_a, scattering_coefficient_b, deciviews, deciviews_a, deciviews_b, visual_range,
          visual_range_a, visual_range_b Particle count fields: 0.3_um_count, 0.3_um_count_a, 0.3_um_count_b,
          0.5_um_count, 0.5_um_count_a, 0.5_um_count_b, 1.0_um_count, 1.0_um_count_a, 1.0_um_count_b,
          2.5_um_count, 2.5_um_count_a, 2.5_um_count_b, 5.0_um_count, 5.0_um_count_a, 5.0_um_count_b,
          10.0_um_count, 10.0_um_count_a, 10.0_um_count_b Configurable Decimal Places You can control
          how many decimal places are returned for each numeric field by using the syntax: fieldname|dN,
          where N is the maximum number of decimal places to include. For example, if pm2.5_atm_a is recorded
          as 3.23: Requested Field Returned Value pm2.5_atm_a|d0 3 pm2.5_atm_a|d1 3.2 pm2.5_atm_a|d2 3.23
          pm2.5_atm_a|d3 3.23 Note: No trailing zeros are added if the requested number of decimal places
          exceeds those present in the stored value. Requesting pm2.5_atm_a|d3 in the table above returns
          3.23 rather than 3.230, because 3.23 is the actual value stored in the database. As decimal
          places are configurable per field, varying precision levels can be applied to different fields
          in the same request: fields=temperature|d1,pm2.5_atm_a|d2,pm2.5_atm_b|d0'
        schema:
          type: string
        required: true
      responses:
        '200':
          description: Success
        4XX:
          description: Error response with a PurpleAir error code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /keys:
    get:
      operationId: check-api-key
      summary: Check an API Key
