name: Publish project release action

# Publisher. A human PR merge never auto-publishes; a release is a deliberate dispatch or a bot merge to main.
#
# - Push trigger (main only, on.push.paths inclusion list below - library source, package metadata, version
#   floor, or the locked dependency set): a code-affecting Dependabot/codegen merge auto-publishes a stable
#   release. The plan job (publish-plan-task.yml) computes the gate once - only the codegen App / Dependabot
#   actor qualifies on a push, so a human merge or promotion to main skips and the maintainer dispatches. uv.lock is
#   listed: a PyPI version can't be re-pushed, so a dependency bump must republish to keep declared dependencies
#   current (closes the stale/vulnerable window).
# - workflow_dispatch: the maintainer publishes the chosen branch - main a stable release, develop a .dev0 prerelease.
# - Gate: publish-pypi needs the same validate-task the PR runs, so nothing publishes that would fail validation.
on:
  push:
    branches: [main]
    paths:
      - 'src/aiopurpleair/**'
      - 'pyproject.toml'
      - 'version.json'
      - 'uv.lock'
  workflow_dispatch:

# Ref-independent group so concurrent publishes serialize, and cancel-in-progress: false so a publish is
# never cancelled mid-release (a half-created GitHub release or partial PyPI upload).
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:

  # Single source of the release-gate decision (publish? stable?); every job gates on its outputs instead of
  # re-testing event/actor/branch. See publish-plan-task.yml for the policy.
  plan:
    name: Plan release job
    uses: ./.github/workflows/publish-plan-task.yml
    with:
      event_name: ${{ github.event_name }}
      actor: ${{ github.actor }}
      ref_name: ${{ github.ref_name }}

  # The same lint + test gate the PR runs, on the branch tip; runs only when a publish will happen.
  validate:
    name: Validate job
    needs: [plan]
    if: ${{ needs.plan.outputs.publish == 'true' }}
    uses: ./.github/workflows/validate-task.yml
    secrets: inherit

  # Build, version, validate, and cut the GitHub release for the triggering branch, and upload the wheel +
  # sdist for publish-pypi. Grants the write scope the github-release job needs (the task declares none, so
  # the read-only smoke caller is not forced to over-grant).
  build:
    name: Build project release job
    needs: [plan, validate]
    if: ${{ needs.plan.outputs.publish == 'true' }}
    uses: ./.github/workflows/build-release-task.yml
    secrets: inherit
    permissions:
      contents: write
    with:
      publish: true
      smoke: false
      branch: ${{ github.ref_name }}

  # OIDC Trusted Publishing: no stored API key. Downloads this run's build artifact and uploads it to PyPI.
  # The pypi environment's deployment branch rule restricts uploads to main + develop as defense in depth.
  publish-pypi:
    name: Publish PyPI library job
    needs: [plan, validate, build]
    if: ${{ needs.plan.outputs.publish == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/ptr727-aiopurpleair/
    # id-token:write for Trusted Publishing's OIDC exchange, contents:read for repo metadata.
    permissions:
      id-token: write
      contents: read

    steps:

      - name: Download build artifacts step
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: aiopurpleair-build-${{ github.ref_name }}
          path: ./dist

      - name: Publish to PyPI step
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: ./dist
          # Skip rather than fail when the version already exists (a re-run or a no-change dispatch).
          skip-existing: true
