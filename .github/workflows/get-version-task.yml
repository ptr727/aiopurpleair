name: Get version information task

# Reusable versioning task: NBGV computes the package version from version.json + git history once, and
# threads it to every consumer (build, release). CalVer base 2026.8; main is the public ref (clean SemVer),
# every other branch carries NBGV's auto -g{sha} prerelease segment. Copied near-verbatim from the shared
# ProjectTemplate task, with a derived Prerelease flag added for the callers that branch on it.

on:
  workflow_call:
    inputs:
      # Git ref to check out and version. Empty falls back to the caller's default checkout ref (github.ref).
      ref:
        required: false
        type: string
        default: ''
    outputs:
      SemVer2:
        description: "SemVer2-shaped version from NBGV (version.json + git history); the release tag name, no v prefix."
        value: ${{ jobs.get-version.outputs.SemVer2 }}
      AssemblyFileVersion:
        description: "M.N.P.B numeric version; the base for the PEP 440 package version the build stamps into _version.py."
        value: ${{ jobs.get-version.outputs.AssemblyFileVersion }}
      # Full SHA of the commit the version was computed from, used to pin the build checkout and the release tag.
      GitCommitId:
        description: "Full SHA the version was computed from; pins the build checkout and the release target_commitish."
        value: ${{ jobs.get-version.outputs.GitCommitId }}
      Prerelease:
        description: "'true' when SemVer2 carries a prerelease '-' segment (non-main), 'false' on a clean public (main) version."
        value: ${{ jobs.get-version.outputs.Prerelease }}

jobs:

  get-version:
    name: Get version information job
    runs-on: ubuntu-latest
    outputs:
      SemVer2: ${{ steps.nbgv.outputs.SemVer2 }}
      AssemblyFileVersion: ${{ steps.nbgv.outputs.AssemblyFileVersion }}
      GitCommitId: ${{ steps.nbgv.outputs.GitCommitId }}
      Prerelease: ${{ steps.out.outputs.Prerelease }}

    steps:

      - name: Setup .NET SDK step
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.x

      - name: Checkout code step
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          # NBGV walks history height; a shallow clone breaks version computation.
          fetch-depth: 0

      # nbgv is floated on @master: its tag stream lags master, so Dependabot tag-tracking would propose a downgrade.
      # Revisit if dotnet/nbgv resumes regular tagged releases.
      - name: Run Nerdbank.GitVersioning tool step
        id: nbgv
        uses: dotnet/nbgv@master
        env:
          # Version from the checked-out branch, not the CI ref. GITHUB_REF is reserved and a step env can't reliably
          # override it (the runner re-injects the dispatch ref), so on a publish dispatched from the default branch NBGV
          # would classify every leg as the public ref. IGNORE_GITHUB_REF makes NBGV ignore GITHUB_REF and use the
          # checked-out branch, which each caller already is. The validate-release gate backstops any misclassification.
          IGNORE_GITHUB_REF: "true"

      - name: Compose workflow outputs step
        id: out
        # NBGV's PrereleaseVersion output only carries version.json's `-tag` segment (empty for a bare CalVer base); the
        # auto-appended -g{sha} segment lives in SemVer2 but is not exposed there. Detect prerelease by testing SemVer2
        # for any `-`: true for `2026.8.5-g1a2b3c4` (develop), false for `2026.8.5` (main). This also keeps a manual
        # workflow_dispatch from the wrong branch honest about its prerelease status.
        env:
          SEMVER2: ${{ steps.nbgv.outputs.SemVer2 }}
        run: |
          set -euo pipefail
          if [[ "$SEMVER2" == *-* ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi
          echo "Prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Version: $SEMVER2 (prerelease: $PRERELEASE)"
